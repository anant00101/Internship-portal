<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Internships — InternHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <style>
    body { display:flex; }
    .content-area { margin-left:250px; flex:1; min-height:100vh; background:var(--bg-primary); }
    .topbar { background:rgba(13,17,23,0.95); border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; backdrop-filter:blur(20px); }
    .avatar-sm { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#00a8f3); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; color:#0D1117; overflow:hidden; }
    .internship-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; transition:all 0.25s; margin-bottom:0.75rem; }
    .internship-card:hover { border-color:rgba(0,212,170,0.35); transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,0,0,0.3); }
    .company-avatar { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1rem; flex-shrink:0; }
    .skeleton { background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-secondary) 50%,var(--bg-card) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:var(--radius); }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @media(max-width:768px){body{flex-direction:column}.content-area{margin-left:0}}
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">Intern<span style="color:var(--text-primary);">Hub</span></div>
  <a href="student-dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
  <a href="internships.html" class="sidebar-link"><i class="bi bi-search"></i> Browse Internships</a>
  <a href="student-dashboard.html" class="sidebar-link"><i class="bi bi-send"></i> My Applications</a>
  <a href="saved.html" class="sidebar-link active"><i class="bi bi-bookmark"></i> Saved</a>
  <a href="profile.html" class="sidebar-link"><i class="bi bi-person-circle"></i> Profile</a>
  <div style="position:absolute;bottom:1.5rem;left:1rem;right:1rem;">
    <a href="javascript:void(0)" class="sidebar-link" onclick="Auth.logout()" style="color:#f87171;border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.05);">
      <i class="bi bi-box-arrow-left"></i> Logout
    </a>
  </div>
</div>

<div class="content-area">
  <div class="topbar">
    <h6 style="font-weight:700;margin:0;font-size:1rem;">Saved Internships</h6>
    <div class="dropdown">
      <div class="d-flex align-items-center gap-2" style="cursor:pointer;" data-bs-toggle="dropdown">
        <div class="avatar-sm" id="avatarEl">?</div>
        <div>
          <div style="font-weight:600;font-size:0.85rem;line-height:1;" id="userName">Loading...</div>
          <div style="font-size:0.72rem;color:var(--text-muted);" id="userCollege">Student</div>
        </div>
        <i class="bi bi-chevron-down ms-1" style="font-size:0.75rem;color:var(--text-muted);"></i>
      </div>
      <ul class="dropdown-menu dropdown-menu-end shadow-sm" style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;margin-top:10px;min-width:220px;padding:0.5rem 0;">
        <li>
          <div class="px-3 py-2 mb-1" style="border-bottom:1px solid var(--border);">
            <div style="font-weight:700;font-size:0.9rem;color:var(--text-primary);" id="dropdownName">Loading...</div>
            <div style="font-size:0.8rem;color:var(--text-muted);word-break:break-all;" id="dropdownEmail">user@example.com</div>
          </div>
        </li>
        <li><a class="dropdown-item py-2" href="profile.html" style="color:var(--text-primary);font-size:0.88rem;"><i class="bi bi-person me-2"></i> Edit Profile</a></li>
        <li><hr class="dropdown-divider" style="border-color:var(--border);"></li>
        <li><a class="dropdown-item py-2" href="javascript:void(0)" onclick="Auth.logout()" style="color:#f87171;font-size:0.88rem;"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
      </ul>
    </div>
  </div>

  <div class="p-4">
    <div class="mb-4">
      <h4 style="font-weight:800;margin-bottom:0.2rem;">Your Saved Internships 📌</h4>
      <p class="muted-text" style="font-size:0.88rem;">Keep track of roles you're interested in applying for later.</p>
    </div>
    <div class="row">
      <div class="col-lg-9">
        <div id="savedGrid">
          <div class="skeleton mb-3" style="height:120px;"></div>
          <div class="skeleton mb-3" style="height:120px;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="api.js"></script>
<script>
  const avatarColors = ['rgba(59,130,246,0.15):#60a5fa','rgba(234,88,12,0.15):#fb923c','rgba(124,58,237,0.15):#a78bfa','rgba(16,185,129,0.15):#10b981','rgba(236,72,153,0.15):#ec4899','rgba(20,184,166,0.15):#14b8a6'];
  function getAvatarStyle(name = '') {
    const idx = (name.charCodeAt(0) || 0) % avatarColors.length;
    const [bg, color] = avatarColors[idx].split(':');
    return { bg, color, letter: name.charAt(0).toUpperCase() || '?' };
  }

  function renderCard(intern) {
    const id = String(intern._id);
    const av = getAvatarStyle(intern.companyName);
    const workBadge = intern.workType === 'Remote' ? 'badge-teal' : intern.workType === 'In-Office' ? 'badge-purple' : 'badge-orange';
    const skills = (intern.skills || []).slice(0, 3).map(s => `<span class="tag">${s}</span>`).join('');
    const stipend = intern.stipend?.amount ? `&#8377;${intern.stipend.amount.toLocaleString('en-IN')}/mo` : 'Unpaid';
    return `<div class="internship-card" id="card-${id}">
      <div class="d-flex align-items-start gap-3">
        <div class="company-avatar" style="background:${av.bg};color:${av.color};">${av.letter}</div>
        <div class="flex-grow-1">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h6 style="font-weight:700;margin-bottom:2px;">${intern.title}</h6>
              <div class="muted-text" style="font-size:0.85rem;margin-bottom:0.5rem;">${intern.companyName} &middot; ${intern.location}</div>
            </div>
            <button class="saved-btn saved" onclick="removeSaved(event,'${id}')" style="background:transparent;border:1.5px solid rgba(251,146,60,0.5);color:#fb923c;border-radius:8px;padding:0.3rem 0.6rem;cursor:pointer;font-size:1rem;">
              <i class="bi bi-bookmark-fill"></i>
            </button>
          </div>
          <div class="d-flex flex-wrap gap-2 mb-2">
            <span class="${workBadge}">${intern.workType}</span>
            ${skills}
          </div>
          <div class="d-flex align-items-center gap-3 flex-wrap">
            <span class="muted-text" style="font-size:0.82rem;"><i class="bi bi-currency-rupee"></i> ${stipend}</span>
            <span class="muted-text" style="font-size:0.82rem;"><i class="bi bi-clock"></i> ${intern.duration}</span>
          </div>
          <div class="mt-2">
            <button class="btn btn-accent btn-sm py-1 px-3" style="font-size:0.8rem;" onclick="applyNow(event,'${id}')">
              <i class="bi bi-send me-1"></i>Apply Now
            </button>
          </div>
        </div>
      </div>
    </div>`;
  }

  async function loadSaved() {
    const grid = document.getElementById('savedGrid');
    const res = await AuthAPI.getSaved();
    if (!res.success) {
      grid.innerHTML = `<div style="text-align:center;padding:3rem 0;color:var(--text-muted);background:var(--bg-card);border:1px dashed var(--border);border-radius:12px;">
        <i class="bi bi-wifi-off" style="font-size:2.5rem;display:block;margin-bottom:1rem;color:#f87171;"></i>
        <div style="font-weight:600;margin-bottom:0.5rem;color:#f87171;">Failed to load saved internships</div>
        <div style="font-size:0.85rem;">${res.error || 'Please try again.'}</div>
        <button class="btn btn-accent btn-sm mt-3" onclick="loadSaved()">Retry</button>
      </div>`;
      return;
    }
    const data = res.data?.data || res.data || [];
    if (!data.length) {
      grid.innerHTML = `<div style="text-align:center;padding:3rem 0;color:var(--text-muted);background:var(--bg-card);border:1px dashed var(--border);border-radius:12px;">
        <i class="bi bi-bookmark" style="font-size:2.5rem;display:block;margin-bottom:1rem;"></i>
        <div style="font-weight:600;margin-bottom:0.5rem;">No saved internships yet</div>
        <a href="internships.html" class="btn btn-accent btn-sm mt-2">Browse Internships</a>
      </div>`;
      return;
    }
    grid.innerHTML = data.map(renderCard).join('');
  }

  async function removeSaved(e, id) {
    e.stopPropagation();
    const card = document.getElementById(`card-${id}`);
    if (card) card.style.opacity = '0.5';
    const res = await AuthAPI.toggleSave(id);
    if (res.success) {
      UI.showToast('Removed from saved', 'info');
      if (card) card.remove();
      if (!document.querySelectorAll('.internship-card').length) loadSaved();
    } else {
      if (card) card.style.opacity = '1';
      UI.showToast('Failed to remove', 'error');
    }
  }

  async function applyNow(e, internshipId) {
    e.stopPropagation();
    const btn = e.target.closest('button');
    UI.setLoading(btn, true);
    const result = await ApplicationAPI.apply(internshipId, {});
    UI.setLoading(btn, false);
    if (!result.success) { UI.showToast(result.error || 'Application failed', 'error'); return; }
    UI.showToast('Application submitted! 🎉');
    btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Applied';
    btn.disabled = true;
    btn.style.background = 'rgba(0,212,170,0.1)';
  }

  initAuthPage('student').then(u => {
    if (!u) return;
    const initials = (u.firstName?.[0] || '') + (u.lastName?.[0] || '');
    document.getElementById('userName').textContent = (u.firstName || '') + ' ' + (u.lastName || '');
    document.getElementById('userCollege').textContent = u.college || 'Student';
    document.getElementById('dropdownName').textContent = (u.firstName || '') + ' ' + (u.lastName || '');
    document.getElementById('dropdownEmail').textContent = u.email || '';
    const av = document.getElementById('avatarEl');
    if (u.profilePicture) {
      av.innerHTML = `<img src="${u.profilePicture}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
      av.style.background = 'transparent';
    } else {
      av.textContent = initials || '?';
    }
    loadSaved();
  });
</script>
</body>
</html>
